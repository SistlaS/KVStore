syntax = "proto3";

option go_package = "madkv/kvstore/gen/kvpb;kvpb";

message WALCommand {
  enum Op {
    OP_UNSPECIFIED = 0;
    OP_PUT = 1;
    OP_SWAP = 2;
    OP_DELETE = 3;
  }

  Op op = 1;
  string key = 2;
  string value = 3;
}

message ClientCommand {
  WALCommand wal = 1;
  string request_id = 2;
}

message RaftLogEntry {
  uint64 index = 1;
  uint64 term = 2;
  ClientCommand command = 3;
}
