syntax = "proto3";

package kvrpc;

// RPC Service Definition
service KVService {
    rpc Put(PutReq) returns (PutResp);
    rpc Swap(SwapReq) returns (SwapResp);
    rpc Get(GetReq) returns (GetResp);
    rpc Scan(ScanReq) returns (ScanResp);
    rpc Delete(DeleteReq) returns (DeleteResp);
    rpc Length(LengthReq) returns (LengthResp);
}

// Put
message PutReq {
    string key = 1;
    string value = 2;
}

message PutResp {
    bool found = 1;
}

// Swap
message SwapReq {
    string key = 1;
    string value = 2;
}

message SwapResp {
    string old_value = 1;
    bool found = 2;
}

// Get
message GetReq {
    string key = 1;
}

message GetResp {
    string value = 1;
    bool found = 2;
}

// Scan

message ScanReq {
    string start_key = 1;
    string end_key = 2;
}

message KeyValuePair {
    string key = 1;
    string value = 2;
}

message ScanResp {
    repeated KeyValuePair items = 1;
}

// Delete
message DeleteReq {
    string key = 1;
}

message DeleteResp {
    bool found = 1;
}

// Length
message LengthReq {}

message LengthResp {
    int64 length = 1;
}