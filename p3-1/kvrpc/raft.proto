syntax = "proto3";

package raft_rpc;

service RaftService {
    rpc AppendEntries(AppendEntriesReq) returns (AppendEntriesResp);
    rpc RequestVote(RequestVoteReq) returns (RequestVoteResp);
}

message LogEntry {
    uint64 idx = 3;
    uint64 term = 1;
    string command = 2;
} 

message AppendEntriesReq {
    uint64 term = 1;
    uint32 leader_id = 2;
    uint64 prev_log_idx = 3;
    uint64 prev_log_term = 4;
    repeated LogEntry entries = 5;
    uint64 leader_commit = 6;
}

message AppendEntriesResp {
    uint64 term = 1;
    bool success = 2;
    uint64 good_log_idx = 3; // last non-conflicting idx
}

message RequestVoteReq {
    uint64 term = 1;
    uint32 candidate_id = 2;
    uint64 last_log_idx = 3;
    uint64 last_log_term = 4;
}

message RequestVoteResp {
    uint64 term = 1;
    bool vote_granted = 2;
}
