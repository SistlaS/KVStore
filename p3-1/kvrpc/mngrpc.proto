syntax = "proto3";

package mngr;

service ClusterManagerService {
    // Called by kvclients to get partition information
    rpc RegisterServer(RegisterServerReq) returns (RegisterServerResp);

    // Called by kvclients to get partition information
    rpc GetPartitionAssignments(PartitionReq) returns (PartitionResp);
}

message Replica {
    string addr = 1;
    uint32 part_id = 2;
    uint32 rep_id = 3;
}

message Partition {
    repeated Replica replicas = 1; // addr of replicas
}

message PartitionReq {
    string client_id = 1; // optional
}

message PartitionResp {
    repeated Partition partitions = 1;
    uint32 n_parts = 2;
}

message RegisterServerReq {
    uint32 part_id = 1;   
    uint32 rep_id = 2; 
    string server_address = 3;
}

message RegisterServerResp {
    bool success = 1;
    uint32 n_parts = 2;
}
